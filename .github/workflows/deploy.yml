name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: astro-src/package-lock.json

      - name: Install dependencies
        working-directory: astro-src
        run: npm ci

      - name: Build Astro site
        working-directory: astro-src
        run: npm run build

      - name: Copy dist to repo root
        run: cp -R astro-src/dist/* .

      - name: Commit and push built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-build: Deploy Astro site"
            git push
          fi

      - name: Trigger Hostinger deployment
        continue-on-error: true
        env:
          WEBHOOK_URL: ${{ secrets.HOSTINGER_WEBHOOK_URL }}
        run: |
          echo "Triggering Hostinger deployment..."
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Warning: HOSTINGER_WEBHOOK_URL secret is not set"
            exit 0
          fi
          HTTP_CODE=$(curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d '{"ref": "refs/heads/main"}' \
            -o /dev/null -w "%{http_code}" 2>&1) || true
          echo "Webhook response: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] 2>/dev/null && [ "$HTTP_CODE" -lt 300 ] 2>/dev/null; then
            echo "Deployment triggered successfully"
          else
            echo "Warning: Webhook issue (code: $HTTP_CODE) - please verify HOSTINGER_WEBHOOK_URL secret"
          fi
