name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: astro-src/package-lock.json

      - name: Install dependencies
        working-directory: astro-src
        run: npm ci

      - name: Build Astro site
        working-directory: astro-src
        run: npm run build

      - name: Copy dist to repo root
        run: cp -R astro-src/dist/* .

      - name: Commit and push built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-build: Deploy Astro site"
            git push
          fi

      - name: Trigger Hostinger deployment
        env:
          WEBHOOK_URL: ${{ secrets.HOSTINGER_WEBHOOK_URL }}
        run: |
          # Trim whitespace from URL
          CLEAN_URL=$(echo "$WEBHOOK_URL" | tr -d '[:space:]')
          echo "Calling Hostinger webhook..."
          HTTP_CODE=$(curl -sS -X POST "$CLEAN_URL" \
            -H "Content-Type: application/json" \
            -o /dev/null -w "%{http_code}")
          echo "Webhook response: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Deployment triggered successfully"
          else
            echo "Warning: Webhook returned $HTTP_CODE"
          fi
